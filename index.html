<!DOCTYPE html>
<html>
<head>
  <title>OpenSourceCity Prototype</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif;">

<!-- City Image -->
<img src="city.png" usemap="#citymap" style="width:100%;">

<!-- Clickable Map -->
<map name="citymap">

  <!-- Blockyright Office -->
  <area shape="rect" coords="50,600,300,900" href="https://github.com/Biginkllc/blockyright-symbol" target="_blank">

  <!-- Betastreet (Main Entry) -->
  <area shape="rect" coords="400,500,800,900" href="https://betastreet.church" target="_blank">

  <!-- Microscopic Gold Exchange -->
  <area shape="rect" coords="900,600,1200,900" href="https://microscopicgold.crypto" target="_blank">

  <!-- Wallet Manager Station -->
  <area shape="rect" coords="600,700,900,1000" href="https://walletmanagers.org" target="_blank">

</map>

</body>
</html>
